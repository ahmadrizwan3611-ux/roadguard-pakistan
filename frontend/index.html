<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoadGuard • Pakistan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            background: radial-gradient(circle at center, #0f172a 0%, #000000 100%);
        }

        .neon-text {
            text-shadow: 0 0 15px #22d3ee, 0 0 30px #67e8f9;
        }

        .glass {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(103, 232, 249, 0.3);
        }

        .glow-button:hover {
            box-shadow: 0 0 30px #22d3ee, 0 0 50px #67e8f9;
            transform: scale(1.05);
        }
    </style>
</head>

<body class="min-h-screen text-cyan-100">

    <div class="max-w-7xl mx-auto p-6">
        <header class="flex justify-between items-center py-8 border-b border-cyan-500/20">
            <div class="flex items-center gap-4">
                <div
                    class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center text-2xl font-bold">
                    RG</div>
                <h1 class="text-4xl font-bold neon-text">ROADGUARD</h1>
            </div>
            <div class="text-emerald-400">● LIVE IN PAKISTAN</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mt-8">
            <!-- Report Form -->
            <div class="lg:col-span-5 glass rounded-3xl p-8">
                <h2 class="text-3xl font-bold mb-6">Report Hazard</h2>

                <div class="space-y-6">
                    <button onclick="getCurrentLocation()"
                        class="w-full glow-button bg-gradient-to-r from-cyan-500 to-blue-600 py-5 rounded-2xl text-xl font-semibold">
                        📍 Detect My Location
                    </button>

                    <select id="hazardType" class="w-full glass p-4 rounded-2xl text-white">
                        <option value="pothole">🕳️ Pothole</option>
                        <option value="accident">🚨 Accident</option>
                        <option value="flood">🌊 Flooding</option>
                        <option value="roadblock">🚧 Road Blockage</option>
                        <option value="other">⚠️ Other</option>
                    </select>

                    <textarea id="description" rows="4" class="w-full glass p-5 rounded-3xl text-white"
                        placeholder="Describe the hazard..."></textarea>

                    <button onclick="submitReport()"
                        class="w-full glow-button py-6 rounded-3xl text-2xl font-bold bg-gradient-to-r from-red-500 to-orange-600">
                        🚨 SUBMIT REPORT
                    </button>
                </div>
            </div>

            <!-- Map -->
            <div class="lg:col-span-7">
                <div class="glass rounded-3xl p-6 h-[500px]">
                    <h3 class="text-2xl font-bold mb-4">Live Hazards Map</h3>
                    <div id="map" class="w-full h-[420px] rounded-2xl"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let map, userMarker, hazardsLayer;

        function initMap() {
            map = L.map('map').setView([31.52, 74.32], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            hazardsLayer = L.layerGroup().addTo(map);
        }

        async function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;

                    if (userMarker) map.removeLayer(userMarker);
                    userMarker = L.marker([lat, lng]).addTo(map).bindPopup("You are here").openPopup();
                    map.setView([lat, lng], 15);
                });
            }
        }

        async function submitReport() {
                const description = document.getElementById("description").value.trim();
                const type = document.getElementById("hazardType").value;

                if (!description) return alert("Please describe the hazard");

                // Get real location if available
                let lat = 31.52;
                let lng = 74.32;

                if (userMarker) {
                    lat = userMarker.getLatLng().lat;
                    lng = userMarker.getLatLng().lng;
                }

                const response = await fetch('/roadguard/report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        latitude: lat,
                        longitude: lng,
                        type: type,
                        description: description
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert("✅ Hazard Reported Successfully! Thank you.");
                    document.getElementById("description").value = "";
                    loadNearbyHazards();
                } else {
                    alert("❌ Error: " + (data.error || "Failed to report"));
                }
            }

            async function loadNearbyHazards() {
                try {
                    const res = await fetch('/roadguard/nearby?lat=31.52&lng=74.32&radius=15');
                    const data = await res.json();

                    hazardsLayer.clearLayers();

                    if (data.hazards && data.hazards.length > 0) {
                        data.hazards.forEach(h => {
                            L.marker([h.latitude, h.longitude])
                                .addTo(hazardsLayer)
                                .bindPopup(`<b>${h.hazard_type}</b><br>${h.description || ''}`);
                        });
                    }
                } catch (e) {
                    console.log("Could not load hazards");
                }
            }
    </script>
</body>

</html>
