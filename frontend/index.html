<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoadGuard • Pakistan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body {
            background: radial-gradient(circle at center, #0f172a 0%, #000000 100%);
        }

        .neon-text {
            text-shadow: 0 0 20px #22d3ee, 0 0 40px #67e8f9;
        }

        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(103, 232, 249, 0.4);
        }

        .glow-button:hover {
            box-shadow: 0 0 35px #22d3ee;
            transform: translateY(-4px);
        }
    </style>
</head>

<body class="min-h-screen text-cyan-100">

    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <header class="flex justify-between items-center py-6 border-b border-cyan-500/30">
            <div class="flex items-center gap-4">
                <div
                    class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center text-3xl font-bold">
                    RG</div>
                <h1 class="text-4xl font-bold neon-text">ROADGUARD</h1>
            </div>
            <div class="flex gap-8 text-sm">
                <a href="#" onclick="showSection('report')" class="hover:text-cyan-400">Report Hazard</a>
                <a href="#" onclick="showSection('map')" class="hover:text-cyan-400">Live Map</a>
                <a href="#" onclick="showSection('myreports')" class="hover:text-cyan-400">My Reports</a>
                <a href="#" onclick="showSection('ai')" class="hover:text-cyan-400">AI Analysis</a>
            </div>
        </header>

        <!-- Report Section -->
        <div id="report-section" class="section grid grid-cols-1 lg:grid-cols-2 gap-8 mt-10">
            <div class="glass rounded-3xl p-10">
                <h2 class="text-3xl font-bold mb-8">Report a Road Hazard</h2>
                <button onclick="getCurrentLocation()"
                    class="w-full glow-button bg-gradient-to-r from-cyan-500 to-blue-600 py-6 rounded-2xl text-xl mb-6">
                    📍 Detect My Location
                </button>

                <select id="hazardType" class="w-full glass p-5 rounded-2xl mb-6 text-lg">
                    <option value="pothole">Pothole</option>
                    <option value="accident">Accident</option>
                    <option value="flood">Flooding</option>
                    <option value="roadblock">Road Blockage</option>
                </select>

                <textarea id="description" rows="5" class="w-full glass p-5 rounded-3xl mb-6"
                    placeholder="Describe the hazard..."></textarea>

                <button onclick="submitReport()"
                    class="w-full glow-button py-7 rounded-3xl text-2xl font-bold bg-gradient-to-r from-red-500 to-orange-600">
                    🚨 SUBMIT REPORT
                </button>
            </div>

            <div class="glass rounded-3xl p-10">
                <h3 class="text-2xl font-bold mb-4">AI Risk Analysis</h3>
                <div id="ai-result" class="min-h-64 text-cyan-200"></div>
            </div>
        </div>

        <!-- Map Section -->
        <div id="map-section" class="section hidden">
            <div class="glass rounded-3xl p-8">
                <h2 class="text-3xl font-bold mb-6">Live Hazards Map - Pakistan</h2>
                <div id="map" class="w-full h-[600px] rounded-3xl"></div>
            </div>
        </div>

        <!-- My Reports -->
        <div id="myreports-section" class="section hidden glass rounded-3xl p-8">
            <h2 class="text-3xl font-bold mb-6">My Reports</h2>
            <div id="my-reports-list" class="space-y-4"></div>
        </div>

        <!-- AI Analysis -->
        <div id="ai-section" class="section hidden glass rounded-3xl p-8">
            <h2 class="text-3xl font-bold mb-6">AI Safety Analysis</h2>
            <textarea id="ai-input" class="w-full glass p-6 rounded-3xl h-48"
                placeholder="Paste hazard description for deep AI analysis..."></textarea>
            <button onclick="analyzeWithAI()" class="mt-6 glow-button px-10 py-4 bg-cyan-600 rounded-2xl">Analyze with
                Groq AI</button>
        </div>
    </div>

    <script>
        let map, hazardsLayer;

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(section + '-section').classList.remove('hidden');
            if (section === 'map') loadMap();
        }

        function initMap() {
            map = L.map('map').setView([31.52, 74.32], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            hazardsLayer = L.layerGroup().addTo(map);
        }

        async function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    alert(`📍 Location: ${pos.coords.latitude}, ${pos.coords.longitude}`);
                });
            }
        }

        async function submitReport() {
            const desc = document.getElementById("description").value;
            if (!desc) return alert("Please describe the hazard");

            const res = await fetch('/roadguard/report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    latitude: 31.52,
                    longitude: 74.32,
                    type: document.getElementById("hazardType").value,
                    description: desc
                })
            });

            const data = await res.json();
            if (data.success) {
                alert("✅ Report Submitted Successfully!");
                document.getElementById("description").value = "";
                loadNearbyHazards();
            }
        }

        async function loadNearbyHazards() {
            try {
                const res = await fetch('/roadguard/nearby?lat=31.52&lng=74.32&radius=20');
                const data = await res.json();
                hazardsLayer.clearLayers();
                data.hazards.forEach(h => {
                    L.marker([h.latitude, h.longitude]).addTo(hazardsLayer)
                        .bindPopup(`<b>${h.hazard_type}</b><br>${h.description}`);
                });
            } catch (e) { }
        }

        function loadMap() {
            if (!map) initMap();
            loadNearbyHazards();
        }

        // Initial Load
        window.onload = () => {
            showSection('report');
        };
    </script>
</body>

</html>
